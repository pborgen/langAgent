services:
  redis:
    image: redis:7-alpine
    container_name: vllm-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - vllm_redis_data:/data

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --host 0.0.0.0
      --port 8001
      --api-key ${VLLM_API_KEY:-change-me}
      --dtype ${VLLM_DTYPE:-auto}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
    ports:
      - "${VLLM_PORT:-8001}:8001"
    volumes:
      - vllm_hf_cache:/root/.cache/huggingface
    gpus: all

  memory-proxy:
    build:
      context: ../..
      dockerfile: scripts/vllm/Dockerfile.memory-proxy
    container_name: vllm-memory-proxy
    restart: unless-stopped
    depends_on:
      - redis
      - vllm
    environment:
      REDIS_URL: "redis://redis:6379/0"
      VLLM_API_BASE: "http://vllm:8001"
      VLLM_MODEL: "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
      VLLM_API_KEY: "${VLLM_API_KEY:-change-me}"
      PROXY_API_KEY: "${PROXY_API_KEY:-change-me}"
      MEMORY_MAX_MESSAGES: "${MEMORY_MAX_MESSAGES:-20}"
      REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS:-120}"
    ports:
      - "${PROXY_PORT:-8010}:8010"

volumes:
  vllm_hf_cache:
  vllm_redis_data:
